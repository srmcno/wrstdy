<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Rate Study Tool — Choctaw Nation OWRM</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --teal:#1E3D3B;--teal-deep:#152B2A;--teal-mid:#287575;
  --lime:#76B900;--lime-dim:#5A9400;--lime-pale:#f0f9e0;
  --amber:#d97706;--red:#dc2626;--blue:#1e40af;
  --body-bg:linear-gradient(150deg,#eef1f3,#dfe4e8,#eaecef) fixed;
  --card:#ffffff;--surface:#f8fafc;--border:#e2e8f0;
  --text:#0f172a;--mid:#475569;--dim:#94a3b8;
  --font:'Gill Sans MT','Gill Sans Nova','Gill Sans','Trebuchet MS',sans-serif;
  --r:10px;--sh:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.05);
  --sh2:0 4px 20px rgba(0,0,0,.12),0 8px 36px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:var(--font);font-size:13px;font-weight:400;color:var(--text);background:var(--body-bg);overflow:hidden}
#root{display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c8d4dd;border-radius:3px}
.hdr{background:var(--teal-deep);padding:0 20px;display:flex;align-items:center;gap:14px;height:62px;flex-shrink:0;position:relative;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 5%,var(--lime) 35%,var(--teal-mid) 65%,transparent 95%)}
.seal{width:46px;height:46px;mix-blend-mode:screen;flex-shrink:0;object-fit:contain}
.bn{display:flex;flex-direction:column}.bn-n{font-size:14px;font-weight:600;color:#fff;letter-spacing:.08em}
.bn-d{font-size:10.5px;color:var(--lime);letter-spacing:.04em;margin-top:2px}
.bn-r{height:1px;background:rgba(255,255,255,.12);margin:4px 0}
.bn-a{font-size:11.5px;color:rgba(255,255,255,.6);letter-spacing:.03em}
.hdr-e{margin-left:auto;text-align:right;font-size:9.5px;color:rgba(255,255,255,.25);letter-spacing:.18em;line-height:1.7}
.row{display:flex;flex:1;overflow:hidden}
.sb{width:244px;flex-shrink:0;background:var(--teal);display:flex;flex-direction:column;overflow:hidden}
.sb-hd{padding:12px 14px 10px;flex-shrink:0}.sb-lb{font-size:9.5px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}
.sb-ls{flex:1;overflow-y:auto}
.sb-it{padding:10px 14px;cursor:pointer;border-left:3px solid transparent;transition:background .12s}
.sb-it:hover{background:rgba(255,255,255,.06)}.sb-it.on{background:rgba(118,185,0,.1);border-left-color:var(--lime)}
.sb-nm{font-size:12.5px;color:#fff;font-weight:500;line-height:1.3}
.sb-sb{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.sb-dt{font-size:10px;color:rgba(255,255,255,.22);margin-top:2px}
.sb-ft{padding:10px 14px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
.sb-em{padding:28px 14px;text-align:center;color:rgba(255,255,255,.22);font-size:11.5px;line-height:1.7}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9.5px;letter-spacing:.03em}
.bd{background:rgba(255,255,255,.1);color:rgba(255,255,255,.4)}.bp{background:rgba(118,185,0,.18);color:#a8e060}.bc{background:var(--lime);color:#0a1f00}
.bs{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px}
.bsd{background:#f1f5f9;color:var(--mid)}.bsp{background:var(--lime-pale);color:var(--lime-dim)}.bsc{background:var(--lime);color:#0a1f00}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;border:none;border-radius:7px;padding:7px 16px;transition:all .15s;white-space:nowrap;letter-spacing:.01em}
.b-lime{background:var(--lime);color:#0a1f00}.b-lime:hover{background:var(--lime-dim)}
.b-teal{background:var(--teal);color:#fff}.b-teal:hover{background:var(--teal-deep)}
.b-ghost{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.12)}.b-ghost:hover{background:rgba(255,255,255,.15)}
.b-out{background:transparent;color:var(--teal);border:1px solid var(--border)}.b-out:hover{background:var(--surface)}
.b-del{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5}.b-del:hover{background:#fecaca}
.b-low{background:var(--lime-pale);color:var(--lime-dim);border:1px solid #86efac}.b-low:hover{background:#dcfce7}
.b-med{background:#fffbeb;color:#92400e;border:1px solid #fde68a}.b-med:hover{background:#fef3c7}
.b-hi{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5}.b-hi:hover{background:#fee2e2}
.btn-sm{padding:5px 13px;font-size:11px}.btn-xs{padding:3px 9px;font-size:10.5px;border-radius:5px}
.btn-fw{width:100%}.btn:disabled{opacity:.35;cursor:not-allowed}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.ws-bar{background:#fff;border-bottom:1px solid var(--border);padding:10px 22px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.ws-t{font-size:15px;color:var(--teal)}.ws-s{font-size:11px;color:var(--dim);margin-top:2px}
.tabs{background:#fff;border-bottom:1px solid var(--border);padding:0 22px;display:flex;overflow-x:auto;flex-shrink:0}
.tab{padding:11px 16px;font-family:var(--font);font-size:11.5px;font-weight:500;color:var(--mid);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;white-space:nowrap;transition:all .14s;letter-spacing:.02em}
.tab:hover{color:var(--teal)}.tab.on{color:var(--teal);border-bottom-color:var(--lime)}
.ws-sc{flex:1;overflow-y:auto;padding:22px 24px 80px}
.ws-nv{background:#fff;border-top:1px solid var(--border);padding:10px 22px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.ws-ni{font-size:11px;color:var(--dim)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
.stack{display:flex;flex-direction:column;gap:14px}
.sh{font-size:10px;color:var(--teal);text-transform:uppercase;letter-spacing:.08em;padding-bottom:9px;border-bottom:1px solid var(--border);margin-bottom:13px}
.fld{display:flex;flex-direction:column;gap:4px}
.flb{font-size:11px;color:var(--mid);letter-spacing:.01em}
.fhn{font-size:10px;color:var(--dim);margin-top:2px}
.inp,.sel,.txa{width:100%;padding:7px 11px;border:1px solid var(--border);border-radius:6px;font-family:var(--font);font-size:13px;color:var(--text);background:var(--card);transition:border-color .14s,box-shadow .14s;outline:none}
.inp:focus,.sel:focus,.txa:focus{border-color:var(--teal-mid);box-shadow:0 0 0 3px rgba(30,61,59,.07)}
.sel{cursor:pointer}.txa{resize:vertical}
.cw{position:relative}.cs{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:12px;pointer-events:none;z-index:1}.ci{padding-left:22px!important}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.g5{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:10px}
.al{border-radius:7px;padding:10px 14px;font-size:12px}
.al-i{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.al-ok{background:#f0fdf4;border:1px solid #86efac;color:#166534}
.al-w{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.al-e{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b}
.mc{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;box-shadow:var(--sh)}
.mv{font-size:20px;color:var(--teal);letter-spacing:-.01em}.ml{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.dt{width:100%;border-collapse:collapse;font-size:12.5px}
.dt th{background:var(--teal);color:rgba(255,255,255,.8);padding:7px 12px;text-align:left;font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;font-weight:500}
.dt td{padding:7px 12px;border-bottom:1px solid var(--border);color:var(--text)}
.dt tr:last-child td{border-bottom:none}.dt tr:hover td{background:var(--surface)}
.dt .tr-s td{color:var(--teal);background:#f8fafc;font-weight:500}
.dt .tr-t td{background:var(--teal);color:#fff;border:none;font-weight:500}
.tt{width:100%;border-collapse:collapse;font-size:12px}
.tt th{background:var(--surface);padding:6px 10px;text-align:left;font-size:9.5px;color:var(--teal);text-transform:uppercase;letter-spacing:.05em;font-weight:500;border-bottom:1px solid var(--border)}
.tt td{padding:5px 6px;border-bottom:1px solid var(--border)}
.tt tr:last-child td{border-bottom:none}
.rbar{background:var(--teal);border-radius:var(--r);padding:16px 20px;display:grid;grid-template-columns:1fr 1fr 1fr auto 1fr;gap:10px;align-items:center}
.rdiv{width:1px;background:rgba(255,255,255,.15);align-self:stretch}
.rlb{font-size:9.5px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.rv{font-size:18px;color:#fff}.rn{font-size:24px;color:var(--lime)}
.ov-card{border-left:3px solid var(--lime)}
.dbt{background:#fff;border-radius:var(--r);border:1px solid var(--border);overflow:hidden;box-shadow:var(--sh)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:12px;padding:26px;box-shadow:var(--sh2);min-width:380px}
.sc-pill{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:500;cursor:pointer;border:1px solid transparent}
.sc-ok{background:var(--lime-pale);color:var(--lime-dim);border-color:#86efac}
.sc-warn{background:#fffbeb;color:#92400e;border-color:#fde68a}
.sc-bad{background:#fef2f2;color:#991b1b;border-color:#fca5a5}
.sc-neu{background:#f1f5f9;color:var(--mid);border-color:var(--border)}
.ai-out{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;font-size:12.5px;line-height:1.75;color:var(--text);white-space:pre-wrap;min-height:120px}
.sub-tab{padding:7px 14px;font-family:var(--font);font-size:11px;cursor:pointer;border:1px solid var(--border);background:transparent;border-radius:6px;transition:all .12s;font-weight:500;color:var(--mid)}
.sub-tab.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.cls-pill{padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--mid);transition:all .12s;font-weight:500}
.cls-pill.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.print-only{display:none}
@media print{
  .no-print{display:none!important}
  .print-only{display:block!important}
  body{background:#fff!important;overflow:visible;height:auto}
  #root{height:auto;overflow:visible}
  .row{overflow:visible}.main{overflow:visible}.ws-sc{overflow:visible;padding:0}
  .card{break-inside:avoid;box-shadow:none;border:1px solid #ddd}
  .pg-break{page-break-before:always}
}
</style>
</head>

// ─── CALC ENGINE ─────────────────────────────────────────────────────────────
const nv=v=>parseFloat(v)||0;

// Bill using $/1000 gal tiers; each tier is one 1000-gal block up to tier.gal cumulative
function calcBill(minCharge,tiers,gallons){
  let bill=nv(minCharge),rem=nv(gallons),prev=0;
  for(const t of tiers){
    const top=nv(t.gal);
    const block=Math.min(rem,top-prev);
    if(block<=0)break;
    bill+=(block/1000)*nv(t.rate);
    rem-=block;prev=top;
    if(rem<=0)break;
  }
  // gallons beyond last tier: use last tier rate
  if(rem>0&&tiers.length>0){
    bill+=(rem/1000)*nv(tiers[tiers.length-1].rate);
  }
  return bill;
}

// Auto-calc cumulative bill at each tier level
function tierTopAmounts(minCharge,tiers){
  const res=[];let cum=nv(minCharge);
  for(let i=0;i<tiers.length;i++){
    cum+=nv(tiers[i].rate); // each block is exactly 1000 gal → 1000/1000 × rate = rate
    res.push(cum);
  }
  return res;
}

// Monthly income for a class (customers × bill at avg usage)
// Since we don't have per-customer usage, use gallonsSold / customers as avg usage
// For a class: total monthly = sum of all customers' bills
// Simplification: all customers on same tier = customers × bill(gallonsSold/customers)
// But spreadsheet shows each customer at specific gallon level...
// We'll use: monthly income from class = all customers × bill(avgUsage)
// and avgUsage = gallonsSold / customers (total gal / # customers)
function classMonthlyIncome(cls,isProposed){
  const d=isProposed?cls.prop:cls.cur;
  const cust=nv(d.customers);
  if(cust<=0)return{monthly:0,annual:0,fixed:0,volumetric:0};
  // Use gallons from the class sheet; we store gallonsSold as totalGallons for the class
  const totalGal = nv(d.gallonsSold)||0;
  const avgGal = cust>0?totalGal/cust:0;
  const bill=calcBill(d.minCharge,d.tiers,avgGal);
  const monthly=cust*bill;
  const fixed=cust*nv(d.minCharge);
  const volumetric=monthly-fixed;
  return{monthly,annual:monthly*12,fixed,volumetric};
}

function budgetTotal(b){
  const flat=obj=>Object.values(obj).reduce((s,v)=>s+nv(v),0);
  const emp=flat(b.emp),ofc=flat(b.ofc),plt=flat(b.plt),dst=flat(b.dst),veh=flat(b.veh),loa=flat(b.loa),oth=flat(b.oth);
  return{emp,ofc,plt,dst,veh,loa,oth,total:emp+ofc+plt+dst+veh+loa+oth};
}

function totalRevenue(classes,isProposed){
  return classes.filter(c=>c.enabled).reduce((s,c)=>{
    const d=classMonthlyIncome(c,isProposed);
    return{monthly:s.monthly+d.monthly,annual:s.annual+d.annual,fixed:s.fixed+d.fixed,volumetric:s.volumetric+d.volumetric};
  },{monthly:0,annual:0,fixed:0,volumetric:0});
}

// Cost per 1000 gal = total monthly expenses / (total monthly gallons / 1000)
function costPer1000(budget,classes,isProposed){
  const exp=budgetTotal(budget).total;
  const gal=classes.filter(c=>c.enabled).reduce((s,c)=>{
    const d=isProposed?c.prop:c.cur;
    return s+nv(d.gallonsSold);
  },0);
  return gal>0?(exp/(gal/1000)):0;
}

// Cost for exactly 5000 gal (residential class, or first enabled class)
function cost5000(classes,isProposed){
  const res=classes.find(c=>c.id==='res')||classes.find(c=>c.enabled);
  if(!res)return 0;
  const d=isProposed?res.prop:res.cur;
  return calcBill(d.minCharge,d.tiers,5000);
}

// Affordability Index = cost5000 / monthlyMHI (< 2% = affordable)
function affordabilityIndex(classes,isProposed,mhi){
  const c5=cost5000(classes,isProposed);
  const m=nv(mhi);
  return m>0?c5/m:0;
}

// Operating Ratio = monthly income / monthly expenses (>1.25 = healthy)
function operatingRatio(rev,expTotal){
  return expTotal>0?rev/expTotal:0;
}

// Debt to Income = monthly debt payments / monthly income
function debtToIncome(budget,rev){
  const debt=nv(budget.loa.newLoan)+nv(budget.loa.owrb)+nv(budget.loa.bank)+nv(budget.loa.other);
  return rev>0?debt/rev:0;
}

// Base-Only Coverage = total base charges / total expenses
function baseCoverage(classes,isProposed,expTotal){
  const fixed=classes.filter(c=>c.enabled).reduce((s,c)=>{
    const d=isProposed?c.prop:c.cur;
    return s+nv(d.customers)*nv(d.minCharge);
  },0);
  return expTotal>0?fixed/expTotal:0;
}

// 5-Year fund balance projection
function calc5Yr(classes,curBudget,propBudget,forecast){
  const inf=1+nv(forecast.inflationRate)/100;
  const curRev=totalRevenue(classes,false).annual;
  const propRev=totalRevenue(classes,true).annual;
  const expBase=budgetTotal(propBudget).total*12;
  let beginFB=nv(forecast.beginFundBalance);
  const target=nv(forecast.targetFundBalance);
  const yrs=['FY1','FY2','FY3','FY4','FY5'];
  const rows={curRevArr:[],propRevArr:[],expArr:[],curFBArr:[],propFBArr:[],targetArr:[]};
  let curFB=beginFB,propFB=beginFB;
  let exp=expBase;
  for(let i=0;i<5;i++){
    if(i>0)exp*=inf;
    rows.curRevArr.push(curRev);
    rows.propRevArr.push(propRev);
    rows.expArr.push(exp);
    curFB+=curRev-exp;rows.curFBArr.push(curFB);
    propFB+=propRev-exp;rows.propFBArr.push(propFB);
    rows.targetArr.push(target);
  }
  return{yrs,...rows};
}

// High/Med/Low base rate recommendations (based on affordability % of MHI)
function calcHML(cls,isProposed,mhi){
  if(!mhi)return null;
  const d=isProposed?cls.prop:cls.cur;
  // volumetric cost for exactly 5000 gal with current tier rates
  const vol5000=calcBill(0,d.tiers,5000); // bill with $0 base
  const m=nv(mhi);
  return{
    low:Math.max(0,m*0.015-vol5000),
    med:Math.max(0,m*0.020-vol5000),
    high:Math.max(0,m*0.025-vol5000)
  };
}

}

// ─── TIER EDITOR WITH CUMULATIVE AUTO-CALC ───────────────────────────────────
function TierTable({minCharge,tiers,onChange,mhi,onSetBase}){
  const tops=tierTopAmounts(minCharge,tiers);
  const updTier=(i,k,v)=>{const t=[...tiers];t[i]={...t[i],[k]:v};onChange(t)};
  const addTier=()=>{const last=tiers[tiers.length-1];onChange([...tiers,{gal:(nv(last.gal)+1000),rate:''}])};
  const remTier=i=>{if(tiers.length<=1)return;const t=[...tiers];t.splice(i,1);onChange(t)};
  const hml=mhi?calcHML({prop:{minCharge,tiers}},true,mhi):null;
  return(
    <div>
      {hml&&(
        <div style={{marginBottom:10}}>
          <div className="flb" style={{marginBottom:6}}>Recommended Base Charge (% of Monthly MHI)</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn b-low btn-sm" onClick={()=>onSetBase(hml.low.toFixed(2))}>
              Low — {$.c(hml.low)} <span style={{fontSize:10}}>(1.5% USDA RD)</span>
            </button>
            <button className="btn b-med btn-sm" onClick={()=>onSetBase(hml.med.toFixed(2))}>
              Medium — {$.c(hml.med)} <span style={{fontSize:10}}>(2.0% benchmark)</span>
            </button>
            <button className="btn b-hi btn-sm" onClick={()=>onSetBase(hml.high.toFixed(2))}>
              High — {$.c(hml.high)} <span style={{fontSize:10}}>(2.5% EPA)</span>
            </button>
          </div>
          {nv(minCharge)>0&&nv(minCharge)<=hml.low+0.01&&(
            <div className="al al-ok" style={{marginTop:8,fontSize:11}}>
              Current base rate qualifies for USDA Rural Development loan/grant eligibility.
            </div>
          )}
        </div>
      )}
      <table className="tt">
        <thead><tr>
          <th>Block (gal)</th>
          <th>Rate ($/1,000 gal)</th>
          <th style={{color:'var(--lime-dim)'}}>Cumulative Bill (auto)</th>
          <th style={{width:28}}></th>
        </tr></thead>
        <tbody>
          {tiers.map((t,i)=>(
            <tr key={i}>
              <td>
                <input className="inp" type="number" step="1000" style={{fontSize:12,padding:'4px 8px'}}
                  value={t.gal} onChange={e=>updTier(i,'gal',Number(e.target.value))} placeholder="1000"/>
              </td>
              <td>
                <div className="cw"><span className="cs" style={{fontSize:11}}>$</span>
                <input className="inp ci" type="number" step="0.01" style={{fontSize:12,padding:'4px 8px 4px 18px'}}
                  value={t.rate} onChange={e=>updTier(i,'rate',e.target.value)} placeholder="0.00"/></div>
              </td>
              <td>
                <div style={{fontSize:12,color:'var(--lime-dim)',fontWeight:500,padding:'4px 8px',background:tops[i]>0?'var(--lime-pale)':'',borderRadius:4}}>
                  {tops[i]>0?$.c(tops[i]):'—'}
                </div>
              </td>
              <td>
                {tiers.length>1&&<button onClick={()=>remTier(i)} style={{fontSize:11,color:'#dc2626',background:'none',border:'none',cursor:'pointer'}}>✕</button>}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
      <button className="btn b-out btn-xs" style={{marginTop:8}} onClick={addTier}>+ Add Tier Block</button>
    </div>
  );
}

// ─── STEP 2: CUSTOMER CLASSES & RATES ────────────────────────────────────────
function Step2({study,onField}){
  const classes=study.classes||defaultClasses();
  const mhi=study.demographics?.medianMonthlyHHI;
  const [selId,setSelId]=useState(classes[0]?.id);
  const [tab,setTab]=useState('cur'); // 'cur' or 'prop'
  const sel=classes.find(c=>c.id===selId)||classes[0];
  const updClass=(id,path,val)=>{
    const nc=classes.map(c=>{
      if(c.id!==id)return c;
      const nc2={...c};
      if(path.length===1)nc2[path[0]]=val;
      else if(path.length===2)nc2[path[0]]={...nc2[path[0]],[path[1]]:val};
      return nc2;
    });
    onField('classes',nc);
  };
  const toggleClass=(id)=>{
    const nc=classes.map(c=>c.id===id?{...c,enabled:!c.enabled}:c);
    onField('classes',nc);
  };
  const curIncome=classMonthlyIncome(sel,'cur'===tab);
  const altIncome=classMonthlyIncome(sel,tab!=='cur');
  const d=tab==='cur'?sel.cur:sel.prop;
  const totCur=totalRevenue(classes,false);
  const totProp=totalRevenue(classes,true);
  return(
    <div className="stack">
      <div><h2 style={{fontSize:15,color:'var(--teal)',marginBottom:3}}>Customer Classes & Rates</h2>
      <p style={{color:'var(--mid)',fontSize:12}}>Enter rates in $/1,000 gallons per block. Cumulative bill amounts auto-calculate at each tier level. Rates: $/1,000 gal.</p></div>
      <div style={{display:'flex',gap:14}}>
        {/* Class selector panel */}
        <div style={{width:190,flexShrink:0}}>
          <div className="card" style={{padding:12}}>
            <div className="sh" style={{marginBottom:10}}>Customer Classes</div>
            {classes.map(c=>(
              <div key={c.id} style={{marginBottom:6}}>
                <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 8px',borderRadius:6,background:c.id===selId?'var(--lime-pale)':'',cursor:'pointer',border:`1px solid ${c.id===selId?'#86efac':'transparent'}`}}>
                  <input type="checkbox" checked={c.enabled} onChange={()=>toggleClass(c.id)} style={{cursor:'pointer'}} onClick={e=>e.stopPropagation()}/>
                  <div style={{flex:1,fontSize:12,color:c.enabled?'var(--text)':'var(--dim)',cursor:'pointer'}} onClick={()=>{setSelId(c.id)}}>
                    {c.id.startsWith('c')?
                      <input className="inp" value={c.name} onChange={e=>{const nc=classes.map(x=>x.id===c.id?{...x,name:e.target.value}:x);onField('classes',nc);}} placeholder={`Class ${c.id.replace('c','')}`} style={{fontSize:11,padding:'2px 6px',border:'none',background:'transparent',width:'100%',color:'inherit'}} onClick={e=>e.stopPropagation()}/>
                      :<span>{c.name}</span>}
                  </div>
                </div>
              </div>
            ))}
          </div>
          <div className="card" style={{padding:12,marginTop:10}}>
            <div style={{fontSize:10,color:'var(--teal)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>System Totals</div>
            <div style={{fontSize:11,color:'var(--mid)',marginBottom:4}}>Monthly — Current: <strong style={{color:'var(--teal)'}}>{$.c(totCur.monthly)}</strong></div>
            <div style={{fontSize:11,color:'var(--mid)',marginBottom:4}}>Monthly — Proposed: <strong style={{color:'var(--lime-dim)'}}>{$.c(totProp.monthly)}</strong></div>
            <div style={{fontSize:11,color:'var(--mid)'}}>Annual — Proposed: <strong style={{color:'var(--teal)'}}>{$.c(totProp.annual)}</strong></div>
          </div>
        </div>
        {/* Detail panel */}
        {sel&&(
          <div style={{flex:1}}>
            <div className="card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                <div style={{fontSize:14,color:'var(--teal)'}}>{sel.name||(sel.id.startsWith('c')?`Class ${sel.id.replace('c','')}`:'Custom Class')}</div>
                <div style={{display:'flex',gap:6}}>
                  <button className={'sub-tab'+(tab==='cur'?' on':'')} onClick={()=>setTab('cur')}>Current Rates</button>
                  <button className={'sub-tab'+(tab==='prop'?' on':'')} onClick={()=>setTab('prop')}>Proposed Rates</button>
                </div>
              </div>
              <div className="g3" style={{marginBottom:14}}>
                <F label="Number of Customers"><input className="inp" type="number" value={d.customers} onChange={e=>updClass(sel.id,[tab==='cur'?'cur':'prop','customers'],e.target.value)}/></F>
                <F label="Total Monthly Gallons Sold" hint="Across all customers in this class"><input className="inp" type="number" value={d.gallonsSold||''} onChange={e=>updClass(sel.id,[tab==='cur'?'cur':'prop','gallonsSold'],e.target.value)} placeholder="0"/></F>
                <F label="Base / Minimum Charge ($)" hint="Monthly minimum regardless of usage"><$I value={d.minCharge} onChange={v=>updClass(sel.id,[tab==='cur'?'cur':'prop','minCharge'],v)}/></F>
              </div>
              <div className="sh">Volume Tier Rates ($/1,000 Gallons)</div>
              <TierTable
                minCharge={d.minCharge}
                tiers={d.tiers}
                onChange={t=>updClass(sel.id,[tab==='cur'?'cur':'prop','tiers'],t)}
                mhi={tab==='prop'?mhi:null}
                onSetBase={v=>updClass(sel.id,[tab==='cur'?'cur':'prop','minCharge'],v)}
              />
              {nv(d.customers)>0&&nv(d.gallonsSold)>0&&(
                <div style={{marginTop:14,padding:12,background:'var(--surface)',borderRadius:7,border:'1px solid var(--border)'}}>
                  <div style={{display:'flex',gap:24,flexWrap:'wrap'}}>
                    <div><div style={{fontSize:10,color:'var(--dim)',textTransform:'uppercase',letterSpacing:'.05em'}}>Monthly Income</div><div style={{fontSize:18,color:'var(--teal)'}}>{$.c(classMonthlyIncome(sel,tab==='prop').monthly)}</div></div>
                    <div><div style={{fontSize:10,color:'var(--dim)',textTransform:'uppercase',letterSpacing:'.05em'}}>Annual Income</div><div style={{fontSize:18,color:'var(--teal)'}}>{$.c(classMonthlyIncome(sel,tab==='prop').annual)}</div></div>
                    <div><div style={{fontSize:10,color:'var(--dim)',textTransform:'uppercase',letterSpacing:'.05em'}}>Avg Usage/Customer</div><div style={{fontSize:18,color:'var(--teal)'}}>{$.n(Math.round(nv(d.gallonsSold)/nv(d.customers)))} gal</div></div>
                    <div><div style={{fontSize:10,color:'var(--dim)',textTransform:'uppercase',letterSpacing:'.05em'}}>Avg Monthly Bill</div><div style={{fontSize:18,color:'var(--teal)'}}>{$.c(classMonthlyIncome(sel,tab==='prop').monthly/nv(d.customers))}</div></div>
                  </div>
                </div>
              )}
            </div>
            {/* Summary table */}
            <div className="card" style={{marginTop:14}}>
              <div className="sh">All Customer Classes — Revenue Summary</div>
              <table className="dt">
                <thead><tr><th>Class</th><th>Customers</th><th style={{textAlign:'right'}}>Current Mo.</th><th style={{textAlign:'right'}}>Proposed Mo.</th><th style={{textAlign:'right'}}>$ Change</th><th style={{textAlign:'right'}}>% Change</th></tr></thead>
                <tbody>
                  {classes.filter(c=>c.enabled).map(c=>{
                    const ci=classMonthlyIncome(c,false),pi=classMonthlyIncome(c,true);
                    const chg=pi.monthly-ci.monthly;
                    const pct=ci.monthly>0?chg/ci.monthly:0;
                    return(
                      <tr key={c.id}>
                        <td>{c.name||c.id}</td>
                        <td>{$.n(c.cur.customers||c.prop.customers)}</td>
                        <td style={{textAlign:'right'}}>{$.c(ci.monthly)}</td>
                        <td style={{textAlign:'right'}}>{$.c(pi.monthly)}</td>
                        <td style={{textAlign:'right',color:chg>=0?'var(--lime-dim)':'var(--red)'}}>{chg>=0?'+':''}{$.c(chg)}</td>
                        <td style={{textAlign:'right'}}>{(pct*100).toFixed(1)}%</td>
                      </tr>
                    );
                  })}
                </tbody>
                <tfoot>
                  <tr className="tr-t">
                    <td>Total</td><td></td>
                    <td style={{textAlign:'right'}}>{$.c(totCur.monthly)}</td>
                    <td style={{textAlign:'right'}}>{$.c(totProp.monthly)}</td>
                    <td style={{textAlign:'right'}}>{totProp.monthly>=totCur.monthly?'+':''}{$.c(totProp.monthly-totCur.monthly)}</td>
                    <td style={{textAlign:'right'}}>{totCur.monthly>0?((totProp.monthly-totCur.monthly)/totCur.monthly*100).toFixed(1)+'%':'—'}</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── BUDGET SECTION HELPER ────────────────────────────────────────────────────

  return(
    <div className="card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingBottom:9,borderBottom:'1px solid var(--border)',marginBottom:13}}>

        <span style={{fontSize:13,color:'var(--teal)'}}>{$.c(total)}</span>

      <div className="g3">
        {fields.map(f=>(

  const budgetKey=tab==='cur'?'curBudget':'propBudget';
  const upd=(section,k,v)=>onField(budgetKey,{...budget,[section]:{...budget[section],[k]:v}});

  const revCur=totalRevenue(study.classes,false);
  const revProp=totalRevenue(study.classes,true);

  const net=rev-tots.total;
  const sections=[
    {title:'Employee Expenses',section:'emp',fields:[{k:'salaries',l:'Salaries'},{k:'healthIns',l:'Health Insurance'},{k:'retirement',l:'Retirement'},{k:'uniforms',l:'Uniforms'},{k:'workersComp',l:'Workers Comp'},{k:'contractLabor',l:'Contract Labor'},{k:'other1',l:'Other'},{k:'other2',l:'Other'}]},

    {title:'Distribution Expenses',section:'dst',fields:[{k:'tools',l:'Tools / Equipment'},{k:'parts',l:'Parts / Supplies'},{k:'chemicals',l:'Chemicals'},{k:'utilities',l:'Utilities'},{k:'other1',l:'Other'},{k:'other2',l:'Other'}]},
    {title:'Vehicle Expenses',section:'veh',fields:[{k:'maint',l:'Maint / Repairs'},{k:'fuel',l:'Fuel / Oil'},{k:'insurance',l:'Insurance'},{k:'other1',l:'Other'},{k:'other2',l:'Other'}]},

    {title:'Other Expenses',section:'oth',fields:[{k:'depreciation',l:'Depreciation'},{k:'longRange',l:'Long Range Plan'},{k:'insurance',l:'Insurance'},{k:'membership',l:'Membership Dues'},{k:'purchasedWater',l:'Purchased Water'},{k:'attorney',l:'Attorney'},{k:'engineer',l:'Engineer / Consultant'},{k:'other',l:'Other'}]}

  return(
    <div className="stack">
      <div><h2 style={{fontSize:15,color:'var(--teal)',marginBottom:3}}>Monthly Budget</h2>
      <p style={{color:'var(--mid)',fontSize:12}}>Monthly expense figures for current and proposed budgets. Enter all amounts as monthly values.</p></div>
      <div style={{display:'flex',gap:8,marginBottom:4}}>
        <button className={'sub-tab'+(tab==='cur'?' on':'')} onClick={()=>setTab('cur')}>Current Budget</button>
        <button className={'sub-tab'+(tab==='prop'?' on':'')} onClick={()=>setTab('prop')}>Proposed Budget</button>
      </div>
      {sections.map(s=>(
        <BudgetSection key={s.section} title={s.title} fields={s.fields} data={budget[s.section]} onChange={(k,v)=>upd(s.section,k,v)}/>
      ))}
      {/* Summary bar */}
      <div className="rbar">
        {[{l:'Total Expenses',v:$.c(tots.total)},{l:'Monthly Income',v:$.c(rev)},{l:'Surplus / (Deficit)',v:(net>=0?'+':'')+$.c(net)}].map(({l,v},i)=>(
          <div key={i} style={{textAlign:'center'}}><div className="rlb">{l}</div><div className={i===2?(net>=0?'rn':'rv'):' rv'} style={i===2&&net<0?{color:'#fca5a5'}:{}}>{v}</div></div>
        ))}
        <div className="rdiv"/>
        <div style={{textAlign:'center'}}><div className="rlb">Operating Ratio</div><div className="rn">{tots.total>0?(rev/tots.total).toFixed(2):'—'}</div></div>
      </div>
    </div>
  );
}

// ─── STEP 4: FINANCIAL METRICS ────────────────────────────────────────────────
function Step4({study}){
  const classes=study.classes||[];
  const mhi=study.demographics?.medianMonthlyHHI;
  const curBT=budgetTotal(study.curBudget||defBudget());
  const propBT=budgetTotal(study.propBudget||defBudget());
  const revCur=totalRevenue(classes,false);
  const revProp=totalRevenue(classes,true);
  const curOR=operatingRatio(revCur.monthly,curBT.total);
  const propOR=operatingRatio(revProp.monthly,propBT.total);
  const curAI=affordabilityIndex(classes,false,mhi);
  const propAI=affordabilityIndex(classes,true,mhi);
  const curDTI=debtToIncome(study.curBudget||defBudget(),revCur.monthly);
  const propDTI=debtToIncome(study.propBudget||defBudget(),revProp.monthly);
  const curBC=baseCoverage(classes,false,curBT.total);
  const propBC=baseCoverage(classes,true,propBT.total);
  const curDepr=nv((study.curBudget||defBudget()).oth?.depreciation);
  const propDepr=nv((study.propBudget||defBudget()).oth?.depreciation);
  const proj=calc5Yr(classes,study.curBudget||defBudget(),study.propBudget||defBudget(),study.forecast||{});
  const curFY5=proj.curFBArr[4]||0;
  const propFY5=proj.propFBArr[4]||0;
  const target=nv(study.forecast?.targetFundBalance)||5000;
  const scorecard=[
    {metric:'Operating Ratio',cur:curOR.toFixed(2),prop:propOR.toFixed(2),benchmark:'≥ 1.25',
      curOk:curOR>=1.25,propOk:propOR>=1.25,
      curStatus:curOR>=1.25?'Healthy':'Below Target',propStatus:propOR>=1.25?'Healthy':'Below Target',
      guide:'Revenue ÷ Monthly Expenses'},
    {metric:'Affordability Index',cur:mhi?$.p(curAI):'N/A',prop:mhi?$.p(propAI):'N/A',benchmark:'< 2.00%',
      curOk:mhi?curAI<0.02:null,propOk:mhi?propAI<0.02:null,
      curStatus:mhi?(curAI<0.02?'Affordable':'Burden'):'Enter MHI',propStatus:mhi?(propAI<0.02?'Affordable':'Burden'):'Enter MHI',
      guide:'Cost of 5,000 gal ÷ Monthly MHI'},
    {metric:'Debt-to-Income Ratio',cur:$.p(curDTI),prop:$.p(propDTI),benchmark:'< 45%',
      curOk:curDTI<0.45,propOk:propDTI<0.45,
      curStatus:curDTI<0.45?'Low':'High',propStatus:propDTI<0.45?'Low':'High',
      guide:'Monthly Debt Payments ÷ Monthly Income'},
    {metric:'Base-Only Coverage',cur:$.p(curBC),prop:$.p(propBC),benchmark:'≥ 100%',
      curOk:curBC>=1.0,propOk:propBC>=1.0,
      curStatus:curBC>=1.0?'Covers Expenses':'Below Break-even',propStatus:propBC>=1.0?'Covers Expenses':'Below Break-even',
      guide:'Base Charges ÷ Total Expenses'},
    {metric:'Monthly Depreciation Set-Aside',cur:$.c(curDepr),prop:$.c(propDepr),benchmark:'> $0',
      curOk:curDepr>0,propOk:propDepr>0,
      curStatus:curDepr>0?'Funded':'Not Funded',propStatus:propDepr>0?'Funded':'Not Funded',
      guide:'Depreciation line item in budget'},
    {metric:'FY5 Fund Balance vs. Target',cur:$.c(curFY5),prop:$.c(propFY5),benchmark:`≥ ${$.c(target)}`,
      curOk:curFY5>=target,propOk:propFY5>=target,
      curStatus:curFY5>=target?'On Target':'Below Target',propStatus:propFY5>=target?'On Target':'Below Target',
      guide:'Projected fund balance at Year 5'}
  ];
  const StatusPill=({ok,label})=>{
    if(ok===null)return<span className="sc-pill sc-neu">{label}</span>;
    return<span className={'sc-pill '+(ok?'sc-ok':'sc-bad')}>{ok?'✓':'✗'} {label}</span>;
  };
  return(
    <div className="stack">
      <div><h2 style={{fontSize:15,color:'var(--teal)',marginBottom:3}}>Financial Health Scorecard</h2>
      <p style={{color:'var(--mid)',fontSize:12}}>Key financial ratios and benchmarks — matching the CNO Water Rate Study Dashboard.</p></div>
      <div className="card">
        <div className="sh">System Scorecard</div>
        <div style={{overflowX:'auto'}}>
          <table className="dt">
            <thead><tr><th>Metric</th><th style={{textAlign:'right'}}>Current</th><th style={{textAlign:'right'}}>Proposed</th><th>Benchmark</th><th>Current Status</th><th>Proposed Status</th><th>Guidance</th></tr></thead>
            <tbody>
              {scorecard.map(r=>(
                <tr key={r.metric}>
                  <td style={{fontWeight:500}}>{r.metric}</td>
                  <td style={{textAlign:'right',fontFamily:'monospace',fontSize:12}}>{r.cur}</td>
                  <td style={{textAlign:'right',fontFamily:'monospace',fontSize:12}}>{r.prop}</td>
                  <td style={{fontSize:11,color:'var(--mid)'}}>{r.benchmark}</td>
                  <td><StatusPill ok={r.curOk} label={r.curStatus}/></td>
                  <td><StatusPill ok={r.propOk} label={r.propStatus}/></td>
                  <td style={{fontSize:10,color:'var(--dim)'}}>{r.guide}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      {/* Revenue by class */}
      <div className="card"><div className="sh">Monthly Revenue by Customer Class</div>
        <table className="dt">
          <thead><tr><th>Class</th><th style={{textAlign:'right'}}>Current ($)</th><th style={{textAlign:'right'}}>Proposed ($)</th><th style={{textAlign:'right'}}>$ Change</th><th style={{textAlign:'right'}}>% Change</th></tr></thead>
          <tbody>
            {classes.filter(c=>c.enabled).map(c=>{
              const ci=classMonthlyIncome(c,false),pi=classMonthlyIncome(c,true),chg=pi.monthly-ci.monthly;
              return<tr key={c.id}><td>{c.name||c.id}</td><td style={{textAlign:'right'}}>{$.c(ci.monthly)}</td><td style={{textAlign:'right'}}>{$.c(pi.monthly)}</td><td style={{textAlign:'right',color:chg>=0?'var(--lime-dim)':'var(--red)'}}>{chg>=0?'+':''}{$.c(chg)}</td><td style={{textAlign:'right'}}>{ci.monthly>0?(chg/ci.monthly*100).toFixed(1)+'%':'—'}</td></tr>;
            })}
          </tbody>
          <tfoot><tr className="tr-t"><td>Total</td><td style={{textAlign:'right'}}>{$.c(revCur.monthly)}</td><td style={{textAlign:'right'}}>{$.c(revProp.monthly)}</td><td style={{textAlign:'right'}}>{$.c(revProp.monthly-revCur.monthly)}</td><td style={{textAlign:'right'}}>{revCur.monthly>0?((revProp.monthly-revCur.monthly)/revCur.monthly*100).toFixed(1)+'%':'—'}</td></tr></tfoot>
        </table>
      </div>
      {/* Revenue mix */}
      <div className="g2">
        <div className="card"><div className="sh">Revenue Mix — Fixed vs. Volumetric</div>
          <table className="dt">
            <thead><tr><th></th><th style={{textAlign:'right'}}>Current (Ann.)</th><th style={{textAlign:'right'}}>%</th><th style={{textAlign:'right'}}>Proposed (Ann.)</th><th style={{textAlign:'right'}}>%</th></tr></thead>
            <tbody>
              <tr><td>Fixed Revenue</td><td style={{textAlign:'right'}}>{$.c(revCur.fixed*12)}</td><td style={{textAlign:'right'}}>{revCur.annual>0?(revCur.fixed*12/revCur.annual*100).toFixed(1)+'%':'—'}</td><td style={{textAlign:'right'}}>{$.c(revProp.fixed*12)}</td><td style={{textAlign:'right'}}>{revProp.annual>0?(revProp.fixed*12/revProp.annual*100).toFixed(1)+'%':'—'}</td></tr>
              <tr><td>Volumetric Revenue</td><td style={{textAlign:'right'}}>{$.c(revCur.volumetric*12)}</td><td style={{textAlign:'right'}}>{revCur.annual>0?(revCur.volumetric*12/revCur.annual*100).toFixed(1)+'%':'—'}</td><td style={{textAlign:'right'}}>{$.c(revProp.volumetric*12)}</td><td style={{textAlign:'right'}}>{revProp.annual>0?(revProp.volumetric*12/revProp.annual*100).toFixed(1)+'%':'—'}</td></tr>
            </tbody>
            <tfoot><tr className="tr-t"><td>Total Annual</td><td style={{textAlign:'right'}}>{$.c(revCur.annual)}</td><td></td><td style={{textAlign:'right'}}>{$.c(revProp.annual)}</td><td></td></tr></tfoot>
          </table>
        </div>
        <div className="card"><div className="sh">Expense Breakdown by Category</div>
          <table className="dt">
            <thead><tr><th>Category</th><th style={{textAlign:'right'}}>Current (Mo.)</th><th style={{textAlign:'right'}}>Proposed (Mo.)</th><th style={{textAlign:'right'}}>$ Change</th></tr></thead>
            <tbody>
              {[['Employee',curBT.emp,propBT.emp],['Office',curBT.ofc,propBT.ofc],['Plant',curBT.plt,propBT.plt],['Distribution',curBT.dst,propBT.dst],['Vehicle',curBT.veh,propBT.veh],['Debt / Loans',curBT.loa,propBT.loa],['Other',curBT.oth,propBT.oth]].filter(r=>r[1]>0||r[2]>0).map(([l,c,p])=>(
                <tr key={l}><td>{l}</td><td style={{textAlign:'right'}}>{$.c(c)}</td><td style={{textAlign:'right'}}>{$.c(p)}</td><td style={{textAlign:'right',color:p-c>=0?'var(--red)':'var(--lime-dim)'}}>{p-c>=0?'+':''}{$.c(p-c)}</td></tr>
              ))}
            </tbody>
            <tfoot><tr className="tr-t"><td>Total</td><td style={{textAlign:'right'}}>{$.c(curBT.total)}</td><td style={{textAlign:'right'}}>{$.c(propBT.total)}</td><td style={{textAlign:'right'}}>{$.c(propBT.total-curBT.total)}</td></tr></tfoot>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── STEP 5: 5-YEAR PROJECTION ────────────────────────────────────────────────
function FundChart({proj}){
  const ref=useRef(null),ch=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(ch.current)ch.current.destroy();
    const font="'Gill Sans MT','Trebuchet MS',sans-serif";
    ch.current=new Chart(ref.current,{type:'line',data:{
      labels:proj.yrs,
      datasets:[
        {label:'Fund Bal (Current Rates)',data:proj.curFBArr,borderColor:'#94a3b8',backgroundColor:'rgba(148,163,184,.06)',tension:.3,fill:true,pointRadius:4},
        {label:'Fund Bal (Proposed Rates)',data:proj.propFBArr,borderColor:'#1E3D3B',backgroundColor:'rgba(30,61,59,.06)',tension:.3,fill:true,pointRadius:4},
        {label:'Target',data:proj.targetArr,borderColor:'#76B900',borderDash:[6,3],pointRadius:0,borderWidth:1.5,fill:false}
      ]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{family:font,size:11}}}},
      scales:{y:{beginAtZero:true,ticks:{callback:v=>'$'+v.toLocaleString(),font:{family:font,size:10}},grid:{color:'#f1f5f9'}},
              x:{ticks:{font:{family:font,size:10}},grid:{color:'#f1f5f9'}}}}});
    return()=>{if(ch.current)ch.current.destroy()};
  },[proj]);
  return <canvas ref={ref} style={{height:220}}/>;
}
function RevExpChart({proj}){
  const ref=useRef(null),ch=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(ch.current)ch.current.destroy();
    const font="'Gill Sans MT','Trebuchet MS',sans-serif";
    ch.current=new Chart(ref.current,{type:'bar',data:{
      labels:proj.yrs,
      datasets:[
        {label:'Revenue (Proposed)',data:proj.propRevArr,backgroundColor:'#76B900',borderRadius:4,borderWidth:0},
        {label:'Revenue (Current)',data:proj.curRevArr,backgroundColor:'#94a3b8',borderRadius:4,borderWidth:0},
        {label:'Expenses',data:proj.expArr,backgroundColor:'#1E3D3B',borderRadius:4,borderWidth:0,type:'line',borderColor:'#1E3D3B',tension:.3,pointRadius:4,fill:false}
      ]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{family:font,size:11}}}},
      scales:{y:{beginAtZero:true,ticks:{callback:v=>'$'+v.toLocaleString(),font:{family:font,size:10}},grid:{color:'#f1f5f9'}},
              x:{ticks:{font:{family:font,size:10}},grid:{color:'#f1f5f9'}}}}});
    return()=>{if(ch.current)ch.current.destroy()};
  },[proj]);
  return <canvas ref={ref} style={{height:200}}/>;
}

function Step5({study,onField}){
  const fc=study.forecast||{};
  const upd=(k,v)=>onField('forecast',{...fc,[k]:v});
  const proj=calc5Yr(study.classes||[],study.curBudget||defBudget(),study.propBudget||defBudget(),fc);
  const propBT=budgetTotal(study.propBudget||defBudget());
  return(
    <div className="stack">
      <div><h2 style={{fontSize:15,color:'var(--teal)',marginBottom:3}}>5-Year Financial Projection</h2>
      <p style={{color:'var(--mid)',fontSize:12}}>Fund balance and revenue/expense projections over 5 years under current and proposed rates.</p></div>
      <div className="card"><div className="sh">Forecast Assumptions</div>
        <div className="g4">
          <F label="Inflation Rate (%/yr)" hint="Applied to annual expenses"><input className="inp" type="number" step="0.1" value={fc.inflationRate||'3'} onChange={e=>upd('inflationRate',e.target.value)}/></F>
          <F label="Revenue Growth (%/yr)" hint="Account growth or usage increase"><input className="inp" type="number" step="0.1" value={fc.revenueGrowth||'0'} onChange={e=>upd('revenueGrowth',e.target.value)}/></F>
          <F label="Beginning Fund Balance ($)"><$I value={fc.beginFundBalance||'0'} onChange={v=>upd('beginFundBalance',v)}/></F>
          <F label="Target Fund Balance ($)"><$I value={fc.targetFundBalance||'5000'} onChange={v=>upd('targetFundBalance',v)}/></F>
        </div>
      </div>
      <div className="card"><div className="sh">Fund Balance Projection</div><FundChart proj={proj}/></div>
      <div className="card"><div className="sh">Revenue vs. Expenses</div><RevExpChart proj={proj}/></div>
      <div className="card"><div className="sh">Year-by-Year Summary</div>
        <table className="dt">
          <thead><tr><th></th>{proj.yrs.map(y=><th key={y} style={{textAlign:'right'}}>{y}</th>)}</tr></thead>
          <tbody>
            <tr><td>Revenue (Current Rates)</td>{proj.curRevArr.map((v,i)=><td key={i} style={{textAlign:'right'}}>{$.c(v)}</td>)}</tr>
            <tr><td>Revenue (Proposed Rates)</td>{proj.propRevArr.map((v,i)=><td key={i} style={{textAlign:'right'}}>{$.c(v)}</td>)}</tr>
            <tr><td>Annual Expenses</td>{proj.expArr.map((v,i)=><td key={i} style={{textAlign:'right'}}>{$.c(v)}</td>)}</tr>
            <tr className="tr-s"><td>Fund Balance (Current)</td>{proj.curFBArr.map((v,i)=><td key={i} style={{textAlign:'right',color:v>=nv(fc.targetFundBalance||5000)?'var(--lime-dim)':'var(--red)'}}>{$.c(v)}</td>)}</tr>
            <tr className="tr-s"><td>Fund Balance (Proposed)</td>{proj.propFBArr.map((v,i)=><td key={i} style={{textAlign:'right',color:v>=nv(fc.targetFundBalance||5000)?'var(--lime-dim)':'var(--red)'}}>{$.c(v)}</td>)}</tr>
            <tr><td style={{color:'var(--lime-dim)'}}>Target ({$.c(fc.targetFundBalance||5000)})</td>{proj.targetArr.map((v,i)=><td key={i} style={{textAlign:'right',color:'var(--lime-dim)'}}>{$.c(v)}</td>)}</tr>
          </tbody>
        </table>
        <div className="al al-i" style={{marginTop:12,fontSize:11}}>3% inflation applied to expenses year-over-year. Revenue held constant at Year 1 rates unless growth rate entered above. Adjust forecast assumptions to model different scenarios.</div>
      </div>
      {/* Rate escalation outlook - matching Final Report 3%/5% table */}
      <div className="card"><div className="sh">5-Year Rate Escalation Outlook</div>
        <p style={{fontSize:12,color:'var(--mid)',marginBottom:12}}>Projected annual expense increases at 3% and 5% inflation scenarios — per the CNO Rate Study Final Report format.</p>
        <table className="dt">
          <thead><tr><th>Scenario</th>{proj.yrs.map(y=><th key={y} style={{textAlign:'right'}}>{y}</th>)}</tr></thead>
          <tbody>
            {[['3% Inflation',0.03],['5% Inflation',0.05]].map(([lbl,rate])=>{
              let base=propBT.total*12;
              return(
                <tr key={lbl}>
                  <td>{lbl}</td>
                  {proj.yrs.map((_,i)=>{
                    const v=base*Math.pow(1+rate,i);
                    return <td key={i} style={{textAlign:'right'}}>{$.c(v)}</td>;
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
        <div style={{fontSize:11,color:'var(--dim)',marginTop:8}}>The 3% scenario represents a conservative adjustment aligning with typical inflation. The 5% scenario accounts for rising costs in utilities, materials, and labor.</div>
      </div>
    </div>
  );
}

// ─── STEP 6: SCENARIOS ────────────────────────────────────────────────────────
function Step6({study}){
  const classes=study.classes||[];
  const mhi=study.demographics?.medianMonthlyHHI;
  const propBT=budgetTotal(study.propBudget||defBudget());
  const [adjustments,setAdj]=useState({res:1,pas:1,com:1,who:1,c5:1,c6:1,c7:1});
  const [inflation,setInflation]=useState(3);
  const adjust=(id,val)=>setAdj(a=>({...a,[id]:nv(val)}));
  const baseMonthly=totalRevenue(classes,true).monthly;
  const propRevAdj=classes.filter(c=>c.enabled).reduce((s,c)=>{
    const inc=classMonthlyIncome(c,true);
    return s+inc.monthly*(adjustments[c.id]||1);
  },0);
  const net=propRevAdj-propBT.total;
  const presets=[
    {label:'Shift to Residential',action:()=>setAdj({res:1.15,pas:1,com:0.95,who:0.95,c5:1,c6:1,c7:1}),hint:'+15% res, -5% com/who'},
    {label:'Shift to Commercial',action:()=>setAdj({res:0.95,pas:1,com:1.20,who:1.10,c5:1,c6:1,c7:1}),hint:'-5% res, +20% com'},
    {label:'Rate Freeze (Current)',action:()=>setAdj({res:0,pas:0,com:0,who:0,c5:0,c6:0,c7:0}),hint:'Revert all to current rates'},
    {label:'High Burden',action:()=>setAdj({res:1.25,pas:1.10,com:1.15,who:1.10,c5:1,c6:1,c7:1}),hint:'+25% res, +15% com'},
    {label:'Reset',action:()=>setAdj({res:1,pas:1,com:1,who:1,c5:1,c6:1,c7:1}),hint:'Back to proposed'}
  ];
  return(
    <div className="stack">
      <div><h2 style={{fontSize:15,color:'var(--teal)',marginBottom:3}}>Scenario Modeling</h2>
      <p style={{color:'var(--mid)',fontSize:12}}>Adjust burden across customer classes to model alternative rate structures. Multipliers apply to proposed monthly income for each class.</p></div>
      <div className="card"><div className="sh">Quick Presets</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {presets.map(p=>(
            <div key={p.label} style={{textAlign:'center'}}>
              <button className="btn b-out btn-sm" onClick={p.action}>{p.label}</button>
              <div style={{fontSize:10,color:'var(--dim)',marginTop:3}}>{p.hint}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="card"><div className="sh">Manual Adjustments — Rate Multiplier per Class</div>
        <p style={{fontSize:11,color:'var(--mid)',marginBottom:12}}>1.00 = proposed rates unchanged. 1.10 = +10% on proposed. 0.90 = -10%.</p>
        <div className="g4">
          {classes.filter(c=>c.enabled).map(c=>(
            <div key={c.id} className="card" style={{padding:10,background:'var(--surface)'}}>
              <div style={{fontSize:11,color:'var(--teal)',marginBottom:6,fontWeight:500}}>{c.name||c.id}</div>
              <input className="inp" type="number" step="0.01" min="0" max="3"
                value={adjustments[c.id]||1} onChange={e=>adjust(c.id,e.target.value)}/>
              <div style={{fontSize:10,color:'var(--dim)',marginTop:4}}>
                Base inc: {$.c(classMonthlyIncome(c,true).monthly*(adjustments[c.id]||1))}
              </div>
            </div>
          ))}
        </div>
      </div>
      {/* Rainy Day Fund */}
      <div className="card" style={{borderLeft:'3px solid var(--lime)'}}>
        <div className="sh">Rainy Day Fund / Capital Reserve Planning</div>
        <p style={{fontSize:12,color:'var(--mid)',marginBottom:12}}>Model how much of the proposed revenue increase should be directed to a capital reserve / rainy day fund.</p>
        <div className="g4">
          <div className="mc"><div className="mv">{$.c(propRevAdj)}</div><div className="ml">Adjusted Monthly Revenue</div></div>
          <div className="mc"><div className="mv">{$.c(propBT.total)}</div><div className="ml">Monthly Expenses</div></div>
          <div className="mc"><div className="mv" style={{color:net>=0?'var(--lime-dim)':'var(--red)'}}>{net>=0?'+':''}{$.c(net)}</div><div className="ml">Net Surplus / (Deficit)</div></div>
          <div className="mc"><div className="mv">{net>0?$.c(net*12):'$0.00'}</div><div className="ml">Annual Reserve Capacity</div></div>
        </div>
        {net>0&&(
          <div className="al al-ok" style={{marginTop:12}}>
            At current scenario, the system can build a <strong>{$.c(net*12)}/year</strong> capital reserve.
            At 5 years, that yields <strong>{$.c(net*12*5)}</strong> in the rainy day fund.
            {mhi&&` Proposed rates remain at ${$.p(affordabilityIndex(classes,true,mhi))} of MHI (< 2.00% = affordable).`}
          </div>
        )}
      </div>
      {/* Scenario impact */}
      <div className="card"><div className="sh">Scenario Revenue by Class</div>
        <table className="dt">
          <thead><tr><th>Class</th><th style={{textAlign:'right'}}>Proposed (Base)</th><th style={{textAlign:'right'}}>Multiplier</th><th style={{textAlign:'right'}}>Scenario Monthly</th><th style={{textAlign:'right'}}>vs. Proposed</th></tr></thead>
          <tbody>
            {classes.filter(c=>c.enabled).map(c=>{
              const base=classMonthlyIncome(c,true).monthly;
              const adj=base*(adjustments[c.id]||1);
              const chg=adj-base;
              return<tr key={c.id}><td>{c.name||c.id}</td><td style={{textAlign:'right'}}>{$.c(base)}</td><td style={{textAlign:'right'}}>{(adjustments[c.id]||1).toFixed(2)}x</td><td style={{textAlign:'right'}}>{$.c(adj)}</td><td style={{textAlign:'right',color:chg>=0?'var(--lime-dim)':'var(--red)'}}>{chg>=0?'+':''}{$.c(chg)}</td></tr>;
            })}
          </tbody>
          <tfoot><tr className="tr-t"><td>Total</td><td style={{textAlign:'right'}}>{$.c(baseMonthly)}</td><td></td><td style={{textAlign:'right'}}>{$.c(propRevAdj)}</td><td style={{textAlign:'right'}}>{$.c(propRevAdj-baseMonthly)}</td></tr></tfoot>
        </table>
      </div>
    </div>
  );
}

// ─── STEP 7: AI ANALYSIS ──────────────────────────────────────────────────────
function Step7({study,onField}){
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState('');
  const ai=study.aiAnalysis||{};
  async function generate(){
    setLoading(true);setErr('');
    try{
      const classes=study.classes||[];
      const mhi=study.demographics?.medianMonthlyHHI;
      const curBT=budgetTotal(study.curBudget||defBudget());
      const propBT=budgetTotal(study.propBudget||defBudget());
      const revCur=totalRevenue(classes,false);
      const revProp=totalRevenue(classes,true);
      const curOR=(curBT.total>0?revCur.monthly/curBT.total:0).toFixed(2);
      const propOR=(propBT.total>0?revProp.monthly/propBT.total:0).toFixed(2);
      const curAI=mhi?(affordabilityIndex(classes,false,mhi)*100).toFixed(2):'N/A';
      const propAI=mhi?(affordabilityIndex(classes,true,mhi)*100).toFixed(2):'N/A';
      const c5cur=cost5000(classes,false),c5prop=cost5000(classes,true);
      const proj=calc5Yr(classes,study.curBudget||defBudget(),study.propBudget||defBudget(),study.forecast||{});
      const prompt=`You are a financial analyst for the Choctaw Nation Office of Water Resource Management. Analyze this water rate study and provide a professional, structured analysis.

SYSTEM: ${study.systemInfo.systemName||'Unknown'}, PWS ID: ${study.systemInfo.pwsId||'N/A'}, ${study.systemInfo.county||''} County, ${study.systemInfo.studyYear||''}.

FINANCIAL METRICS:
- Operating Ratio: Current=${curOR}, Proposed=${propOR} (benchmark ≥ 1.25)
- Affordability Index: Current=${curAI}%, Proposed=${propAI}% (benchmark < 2.00%)
- Cost for 5,000 gal: Current=${$.c(c5cur)}, Proposed=${$.c(c5prop)}
- Monthly Expenses: Current=${$.c(curBT.total)}, Proposed=${$.c(propBT.total)}
- Monthly Revenue: Current=${$.c(revCur.monthly)}, Proposed=${$.c(revProp.monthly)}
- Monthly Net: Current=${$.c(revCur.monthly-curBT.total)}, Proposed=${$.c(revProp.monthly-propBT.total)}
- Median Monthly HHI: ${mhi?$.c(mhi):'Not entered'}
- FY5 Fund Balance (Proposed): ${$.c(proj.propFBArr[4]||0)}
- Target Fund Balance: ${$.c(nv(study.forecast?.targetFundBalance)||5000)}

CUSTOMER CLASSES:
${classes.filter(c=>c.enabled).map(c=>{const ci=classMonthlyIncome(c,false),pi=classMonthlyIncome(c,true);return `- ${c.name||c.id}: ${c.cur.customers||c.prop.customers} customers, Current income ${$.c(ci.monthly)}/mo, Proposed ${$.c(pi.monthly)}/mo`;}).join('\n')}

Write a professional rate study analysis with these sections:
1. EXECUTIVE SUMMARY (2-3 sentences)
2. FINANCIAL HEALTH ASSESSMENT (discuss Operating Ratio, affordability, debt coverage)
3. RATE CHANGE JUSTIFICATION (explain the need and reasonableness)
4. AFFORDABILITY ANALYSIS (discuss USDA RD and EPA thresholds)
5. RISK FLAGS (list any concerns: deficit, high affordability burden, unfunded depreciation, etc.)
6. RECOMMENDATIONS (specific action items for the board)

Be specific with numbers. Write for a board audience. Use plain language.`;
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
      });
      const data=await resp.json();
      const text=data.content?.map(b=>b.text||'').join('')||'No response received.';
      onField('aiAnalysis',{content:text,generatedAt:new Date().toISOString()});
    }catch(e){setErr('AI analysis failed: '+e.message);}
    finally{setLoading(false);}
  }
  return(
    <div className="stack">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><h2 style={{fontSize:15,color:'var(--teal)',marginBottom:3}}>AI Analysis</h2>
        <p style={{color:'var(--mid)',fontSize:12}}>AI-generated analysis of the rate study findings for board reporting.</p></div>
        <button className="btn b-teal" onClick={generate} disabled={loading}>{loading?'Generating...':'Generate AI Analysis'}</button>
      </div>
      {err&&<div className="al al-e">{err}</div>}
      {ai.generatedAt&&<div style={{fontSize:10,color:'var(--dim)'}}>Generated {$.date(ai.generatedAt)}</div>}
      <div className="card">
        {ai.content
          ?<div className="ai-out">{ai.content}</div>
          :<div style={{textAlign:'center',padding:'28px',color:'var(--dim)'}}>
            <div style={{fontSize:28,marginBottom:10,opacity:.4}}>🤖</div>
            <div style={{fontSize:12}}>Click "Generate AI Analysis" to produce a board-ready analysis of this rate study based on the data entered across all steps.</div>
            <div style={{fontSize:11,color:'var(--dim)',marginTop:8}}>Requires financial data in Steps 2–5 for best results.</div>
          </div>
        }
      </div>
    </div>
  );
}

        <span className="ws-ni">Step {step+1} of {STEPS.length}</span>
        <button className="btn b-teal btn-sm" onClick={()=>setStep(s=>Math.min(7,s+1))} disabled={step===7}>Next →</button>
      </div>
    </div>
  );
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function NewStudyModal({onClose,onCreate}){
  const[name,setName]=useState('');const[sys,setSys]=useState('');const[county,setCounty]=useState('');
  function go(){const s=newStudy(name||`Rate Study ${new Date().getFullYear()}`);s.systemInfo.systemName=sys;s.systemInfo.county=county;onCreate(s);}
  return(
    <div className="ov" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal" style={{width:400}}>
        <h3 style={{fontSize:15,color:'var(--teal)',marginBottom:18}}>New Rate Study</h3>
        <div style={{display:'flex',flexDirection:'column',gap:13}}>
          <F label="Study Name"><input className="inp" value={name} onChange={e=>setName(e.target.value)} placeholder={`Rate Study ${new Date().getFullYear()}`} autoFocus onKeyDown={e=>e.key==='Enter'&&go()}/></F>
          <F label="System Name (optional)"><input className="inp" value={sys} onChange={e=>setSys(e.target.value)} placeholder="e.g. Smithville Rural Water District"/></F>
          <F label="County (optional)"><select className="sel" value={county} onChange={e=>setCounty(e.target.value)}><option value="">Select county...</option>{COUNTIES.map(c=><option key={c} value={c}>{c}</option>)}</select></F>
        </div>
        <div style={{display:'flex',justifyContent:'flex-end',gap:10,marginTop:22}}>
          <button className="btn b-out" onClick={onClose}>Cancel</button>
          <button className="btn b-lime" onClick={go}>Create Study</button>
        </div>
      </div>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App(){
  const[studies,setStudies]=useState(()=>loadDB());
  const[activeId,setActiveId]=useState(null);
  const[showNew,setShowNew]=useState(false);
  const fileRef=useRef(null);
  const active=studies.find(s=>s.id===activeId)||null;
  useEffect(()=>saveDB(studies),[studies]);
  const create=s=>{setStudies(p=>[s,...p]);setActiveId(s.id);setShowNew(false)};
  const update=s=>setStudies(p=>p.map(x=>x.id===s.id?s:x));
  const del=id=>{setStudies(p=>p.filter(x=>x.id!==id));if(activeId===id)setActiveId(null)};
  function exportStudy(id){
    const s=id?studies.find(x=>x.id===id):null;
    const data=s?{exportedAt:new Date().toISOString(),version:VER,study:s}:{exportedAt:new Date().toISOString(),version:VER,studies};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url;const safe=(s?.systemInfo?.systemName||s?.name||'all-studies').replace(/[^a-z0-9]/gi,'-').toLowerCase();
    a.download=`wrs-${safe}-${new Date().getFullYear()}.json`;a.click();URL.revokeObjectURL(url);
  }
  function importStudy(e){
    const file=e.target.files?.[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);const arr=d.studies||(d.study?[d.study]:null);if(!arr){alert('Invalid study file.');return;}
      const imp=arr.map(s=>({...s,id:crypto.randomUUID(),name:s.name+' (Imported)',updatedAt:new Date().toISOString()}));
      setStudies(p=>[...imp,...p]);if(imp.length>0)setActiveId(imp[0].id);e.target.value='';}
    catch{alert('Could not parse file.');}};r.readAsText(file);
  }
  return(
    <>
      <Header/>
      <div className="row">
        <Sidebar studies={studies} activeId={activeId} onSelect={setActiveId} onCreate={()=>setShowNew(true)} onImportFile={()=>fileRef.current?.click()} onExport={exportStudy}/>
        <main className="main">{active?<Workspace study={active} onUpdate={update} onDelete={del}/>:<Dashboard studies={studies} onSelect={setActiveId} onCreate={()=>setShowNew(true)}/>}</main>
      </div>
      {showNew&&<NewStudyModal onClose={()=>setShowNew(false)} onCreate={create}/>}
      <input type="file" ref={fileRef} accept=".json" style={{display:'none'}} onChange={importStudy}/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
