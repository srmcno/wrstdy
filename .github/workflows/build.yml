name: Build single-file artifact

on:
  push:
    branches: [main, 'claude/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Build single-file bundle
        env:
          VITE_AI_PROXY_URL: ${{ vars.VITE_AI_PROXY_URL }}
        run: npm run build:single

      - name: Build chunked bundle
        env:
          VITE_AI_PROXY_URL: ${{ vars.VITE_AI_PROXY_URL }}
        run: npm run build

      - name: Upload single-file HTML
        uses: actions/upload-artifact@v4
        with:
          name: water-rate-study-tool-single-file
          path: dist-single/index.html
          if-no-files-found: error

      - name: Upload chunked dist
        uses: actions/upload-artifact@v4
        with:
          name: water-rate-study-tool-dist
          path: dist/
          if-no-files-found: error
